<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact - WebWise Mechanics</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html">WebWise Mechanics</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li><a class="nav-link" href="index.html">Home</a></li>
        <li><a class="nav-link" href="about.html">About</a></li>
        <li><a class="nav-link active" href="contact.html">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- CONTACT -->
<section class="container py-5">
  <h1 class="text-center mb-5">Contact Us</h1>

  <div class="row g-4">

    <!-- FORM -->
    <div class="col-lg-6">
      <form>

        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" placeholder="Enter your name">
        </div>

        <div class="mb-3">
          <label class="form-label">Phone Number</label>
          <input type="text" class="form-control" placeholder="Enter your phone">
        </div>

        <div class="mb-3">
          <label class="form-label">Service Needed</label>
          <textarea class="form-control" rows="4" placeholder="Describe your issue"></textarea>
        </div>

        <button type="submit" class="btn btn-primary w-100">Submit Request</button>

      </form>
    </div>

    <!-- INFO -->
    <div class="col-lg-6">
      <div class="card p-4 mb-3">
        <h5>Workshop Details</h5>
        <p>📍 Location: Your City</p>
        <p>📞 Phone: +91 XXXXX XXXXX</p>
        <p>📧 Email: service@webwise.com</p>
      </div>

      <div class="alert alert-light">
        We respond within 24 hours. Emergency repairs available.
      </div>
    </div>

  </div>
</section>

<!-- FOOTER -->
<footer>
  © 2026 WebWise Mechanics
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
